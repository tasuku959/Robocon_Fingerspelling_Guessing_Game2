<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>指文字当てゲーム（むずかしい）</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin: 30px;
      max-width: 1200px;
      margin-left: auto;
      margin-right: auto;
      padding: 0 16px;
    }

    h1 {
      background: #eee;
      padding: 10px;
      display: inline-block;
      border: 1px solid #aaa;
    }

    .choices {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .choice img {
      width: 100px;
      height: 100px;
      background: linear-gradient(to bottom, #3ac, #2a8);
      border-radius: 5px;
    }

    #answer-area {
      margin-top: 20px;
      display: none;
    }

    #answerInput {
      font-size: 20px;
      padding: 10px;
      width: 300px;
      border: 2px solid green;
      text-align: center;
    }

    button {
      font-size: 18px;
      padding: 10px 20px;
      margin: 10px;
      cursor: pointer;
    }

    #result, #summary {
      margin-top: 20px;
      font-size: 18px;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    #nextButton {
      display: none;
      margin-top: 20px;
    }

    .footer-buttons {
      display: flex;
      justify-content: center;
      gap: 3em;
      margin-top: 2em;
    }

    .back-button,
    .home-button {
      font-size: 1.0em;
      text-decoration: none;
      color: #000;
    }

    /* 共通レスポンシブ */
    #answerInput { width: min(90%, 360px); }
    .choices .choice img { width: min(22vw, 100px); height: auto; }
    button { width: auto; min-width: 120px; }

    @media (max-width: 768px) {
      body { margin: 14px; padding: 0 10px; }
      h1 { font-size: 1.5rem; }
      p { font-size: 14px; }
      .choices { gap: 10px; }
      .choices .choice img { width: 24vw; max-width: 80px; }
      button { width: 100%; font-size: 16px; padding: 10px; margin: 6px 0; }
      #scoreTimer { font-size: 16px; }
      #answerInput { font-size: 18px; width: 90%; }
      .footer-buttons { gap: 1rem; }
    }

    @media (min-width: 769px) and (max-width: 1024px) {
      body { margin: 20px; padding: 0 16px; }
      h1 { font-size: 1.7rem; }
      .choices .choice img { width: min(18vw, 90px); }
      button { font-size: 17px; padding: 9px 18px; }
      #answerInput { width: min(80%, 400px); }
    }

    @media (min-width: 1025px) {
      body { margin: 30px; padding: 0 24px; }
      h1 { font-size: 2rem; }
      .choices .choice img { width: 100px; }
      button { font-size: 18px; padding: 10px 20px; }
      #answerInput { width: 360px; }
    }
  </style>
</head>
<body>

  <h1>指文字当てゲーム（むずかしい）</h1>
  <p>表示された指文字にあてはまる言葉を入力してください。<br>
    【注意】ひらがな のみ入力お願いします。
  </p>

  <div>
    <button onclick="startGame(5)">5問</button>
    <button onclick="startGame(10)">10問</button>
  </div>

  <!-- スコア表示 -->
  <div id="scoreTimer" style="margin-top:20px; font-size:18px;">
    <span id="scoreDisplay">Score: 0</span>
  </div>

  <div id="question-number"></div>
  <div class="choices" id="choices"></div>

  <div id="answer-area">
    <input type="text" id="answerInput" placeholder="回答欄">
    <button onclick="submitAnswer()">回答</button>
  </div>

  <div id="result"></div>
  <button id="nextButton" onclick="nextQuestion()">次の問題へ進む</button>
  <button id="endButton" style="display:none;" onclick="endGame()">終了</button>

  <div id="summary"></div>

  <script>
    const kanaList = [
      'あ','い','う','え','お','か','き','く','け','こ','さ','し','す','せ','そ','た','ち','つ','て','と','な','に','ぬ','ね','の','は','ひ','ふ','へ','ほ','ま','み','む','め','も','や','ゆ','よ','ら','り','る','れ','ろ','わ','を','ん','ー','ゃ','ゅ','ょ','っ','が','ぎ','ぐ','げ','ご','ざ','じ','ず','ぜ','ぞ','だ','ぢ','づ','で','ど','ば','び','ぶ','べ','ぼ','ぱ','ぴ','ぷ','ぺ','ぽ'
    ];

    let currentQuestion = 0;
    let totalQuestions = 0;
    let correctCount = 0;
    let score = 0;
    let currentWord = "";
    let history = [];
    // no timer needed for hard mode

    function startGame(count) {
      currentQuestion = 0;
      totalQuestions = count;
      correctCount = 0;
      score = 0;
      history = [];
      // timer removed
      document.getElementById('summary').innerHTML = '';
      document.getElementById('result').textContent = '';
      document.getElementById('choices').innerHTML = '';
      document.getElementById('question-number').textContent = '';
      document.getElementById('answer-area').style.display = 'none';
      document.getElementById('nextButton').style.display = 'none';
      document.getElementById('endButton').style.display = 'none';
      updateScore();
      nextQuestion();
    }

function nextQuestion() {
  if (currentQuestion >= totalQuestions) {
    showSummary();
    return;
  }

  document.getElementById('result').textContent = '';
  document.getElementById('answerInput').value = '';
  document.getElementById('question-number').textContent = `問題 ${currentQuestion + 1}`;
  document.getElementById('answer-area').style.display = 'none';
  const nextBtn = document.getElementById('nextButton');
  nextBtn.style.display = 'none';
  document.getElementById('choices').innerHTML = '';

  // 3文字のランダムな単語を生成
  // 必ず3文字で生成
  const length = 3;
  currentWord = '';
  for (let i = 0; i < length; i++) {
    currentWord += kanaList[Math.floor(Math.random() * kanaList.length)];
  }

  // 1枚ずつ1秒で表示 → すぐ非表示
  showImagesSequentially(currentWord, () => {
    setTimeout(() => {
      document.getElementById('choices').innerHTML = '';    //全部非表示に
      document.getElementById('answer-area').style.display = 'block';    // 回答欄表示
    }, 1000);
  });

  currentQuestion++;
}


    function showImagesSequentially(word, onComplete) {
      const container = document.getElementById('choices');
      let index = 0;

      function showNext() {
        if (index >= word.length) {
          onComplete();
          return;
        }

        // 一度に1つだけ表示するように
        container.innerHTML = '';

        const kana = word[index];
        const div = document.createElement('div');
        div.className = 'choice';

        const img = document.createElement('img');
        img.src = `../Finger_Spelling_Image_Compressed/${kana.normalize('NFD')}.png`;
        img.alt = kana;

        div.appendChild(img);
        container.appendChild(div);

        index++;
        setTimeout(showNext, 1000); // 1秒で次へ
      }

      showNext();
    }

function submitAnswer() {
  const input = document.getElementById('answerInput').value.trim();
  const isCorrect = input === currentWord;
  document.getElementById('result').textContent = isCorrect ? "正解！🎉" : `不正解！😢 正解は「${currentWord}」`;

  // 画像をまとめて表示
  const container = document.getElementById('choices');
  container.innerHTML = '';
  for (const kana of currentWord) {
    const div = document.createElement('div');
    div.className = 'choice';
    const img = document.createElement('img');
    img.src = `../Finger_Spelling_Image_Compressed/${kana.normalize('NFD')}.png`;
    img.alt = kana;
    div.appendChild(img);
    container.appendChild(div);
  }

  history.push({
    question: currentWord,
    answer: input,
    isCorrect: isCorrect
  });

  if (isCorrect) {
    correctCount++;
    score += 10;
    updateScore();
  }
  document.getElementById('answer-area').style.display = 'none';
  const nextBtn = document.getElementById('nextButton');
  nextBtn.style.display = 'inline-block';
  if (currentQuestion >= totalQuestions) {
    nextBtn.textContent = '結果を見る';
    nextBtn.onclick = showSummary;
  } else {
    nextBtn.textContent = '次の問題へ進む';
    nextBtn.onclick = nextQuestion;
  }
}


    function showSummary() {
      const rate = totalQuestions > 0 ? Math.round((correctCount / totalQuestions) * 100) : 0;
      let summary = `<h2>結果</h2>
        <p>スコア：${score}点</p>
        <p>正解：${correctCount}問 / ${totalQuestions}問</p>
        <p>正解率：${rate}%</p>
        <ul>`;

      history.forEach((q, i) => {
        summary += `<li>第${i + 1}問：${q.isCorrect ? '⭕' : '❌'}（入力：${q.answer} ／ 正解：${q.question}）</li>`;
      });

      summary += '</ul>';
      document.getElementById('summary').innerHTML = summary;
      document.getElementById('choices').innerHTML = '';
      document.getElementById('question-number').textContent = '';
      document.getElementById('result').textContent = '';
      document.getElementById('answer-area').style.display = 'none';
      document.getElementById('nextButton').style.display = 'none';
      document.getElementById('summary').innerHTML = summary;
      saveRanking(score, correctCount, totalQuestions);
      const rankingHtml = renderRanking();
      document.getElementById('summary').innerHTML = summary + rankingHtml;
    }
    // スコア・タイマー・ランキング機能
    // timer constant removed

    function updateScore() {
      document.getElementById('scoreDisplay').textContent = `Score: ${score}`;
    }



    function getRanking() {
      return JSON.parse(localStorage.getItem('rankingHard') || '[]');
    }

    function saveRanking(score, correct, total) {
      const list = getRanking();
      list.push({ score, correct, total, date: new Date().toLocaleString() });
      list.sort((a, b) => b.score - a.score);
      if (list.length > 10) list.splice(10);
      localStorage.setItem('rankingHard', JSON.stringify(list));
    }

    function renderRanking() {
      const list = getRanking();
      if (list.length === 0) return '';
      let html = '<h3>ランキング</h3><ol>';
      list.forEach(e => {
        html += `<li>${e.score}点 （${e.correct}/${e.total}問） ${e.date}</li>`;
      });
      html += '</ol>';
      return html;
    }

    function endGame() {
      totalQuestions = currentQuestion;
      showSummary();
    }

    // Enterキーで回答を送信／次の問題へ移動
    document.addEventListener('keydown', (event) => {
      if (event.key !== 'Enter') return;

      const answerArea = document.getElementById('answer-area');
      const nextButton = document.getElementById('nextButton');

      if (answerArea && answerArea.style.display !== 'none') {
        submitAnswer();
      } else if (nextButton && nextButton.style.display !== 'none') {
        nextQuestion();
      }
    });
  </script>

  <!-- 戻るボタン -->
  <div class="footer-buttons">
    <a href="../../index.html" class="back-button">← 戻る</a>
  </div>

</body>
</html>
